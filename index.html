<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Arenna - Board Meetings</title>

    <!-- Arenna Brand Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@1,500&family=Red+Hat+Display:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FFF9F3',
                        blueServe: '#454A60',
                        mintHIIT: '#B7D7C0',
                        greenBalance: '#718F85',
                        pinkBoost: '#ECCDBC',
                        orangeSwing: '#ED7A42',
                        terracotta: '#B93700',
                    },
                    fontFamily: {
                        sans: ['"Red Hat Display"', 'sans-serif'],
                        serif: ['"Noto Serif"', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { background-color: #FFF9F3; color: #454A60; }
        .italic-emphasis {
            font-family: 'Noto Serif', serif;
            font-style: italic;
            font-weight: 500;
            letter-spacing: -0.025em;
        }
    </style>
</head>
<body class="antialiased min-h-screen font-sans">

    <div class="absolute top-0 right-0 w-64 h-64 bg-mintHIIT rounded-bl-full opacity-50 -z-10 mix-blend-multiply"></div>
    <div class="absolute bottom-0 left-0 w-96 h-96 bg-pinkBoost rounded-tr-full opacity-40 -z-10 mix-blend-multiply"></div>

    <div class="max-w-4xl mx-auto px-8 py-10 relative z-10">

        <header class="flex justify-between items-end border-b-2 border-blueServe pb-4 mb-8">
            <div>
                <h2 class="text-sm font-semibold tracking-widest uppercase text-greenBalance mb-2">Internal Documents</h2>
                <h1 class="text-5xl font-extrabold text-blueServe leading-tight">Studio Arenna</h1>
                <p class="text-xl mt-2 text-blueServe">
                    <span class="italic-emphasis">Board Meeting Archive</span>
                </p>
            </div>
            <div class="w-16 h-16 bg-blueServe flex items-center justify-center rounded-lg text-cream font-bold text-2xl">
                NN
            </div>
        </header>

        <p class="text-sm text-greenBalance mb-8">Select a meeting below to view its materials.</p>

        <!-- Meeting list — add new entries here as new pages are published -->
        <div class="space-y-3" id="meeting-list">
            <p class="text-sm italic-emphasis text-blueServe opacity-50">No meetings published yet.</p>
        </div>

        <footer class="mt-12 pt-4 border-t border-blueServe border-opacity-20 text-center">
            <p class="italic-emphasis text-base text-blueServe">Here, you don't just train. Here, you connect.</p>
        </footer>

    </div>
</body>
</html>
